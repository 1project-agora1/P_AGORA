name: Next.js CI/CD Deploy

on:
  push:
    branches: [ "develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Get Public IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Docker build and push
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker build -t "${{ secrets.DOCKERHUB_NAME }}/${{ secrets.DEV_DOCKERHUB_REPOSITORY }}" .
          docker push "${{ secrets.DOCKERHUB_NAME }}/${{ secrets.DEV_DOCKERHUB_REPOSITORY }}"

      - name: Deploy to Development Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_PUBLIC_IPV4_DNS }}
          username: ${{ secrets.DEV_USER }}
          password: ${{ secrets.DEV_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            sudo docker kill ${{ secrets.API_SERVER_NAME }} || true
            sudo docker rm -f ${{ secrets.API_SERVER_NAME }} || true
            sudo docker images -q ${{ secrets.DOCKERHUB_NAME }}/${{ secrets.DEV_DOCKERHUB_REPOSITORY }} | xargs -r sudo docker rmi
            
            sudo docker pull ${{ secrets.DOCKERHUB_NAME }}/${{ secrets.DEV_DOCKERHUB_REPOSITORY }}
            
            sudo docker compose up -d --no-deps ${{ secrets.API_SERVER_NAME }}
            
            sudo docker image prune -af --filter "until=24h"

